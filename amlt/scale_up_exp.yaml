  # ══════════════════════════════════════════════
  # tmaze-active T=400 — wider (h=256, L=1, critic=512)
  # ══════════════════════════════════════════════
  - name: tmaze_active_400_wider_s0
    sku: 1x40G1-A100
    process_count_per_node: 1
