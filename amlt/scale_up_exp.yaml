          --config_env.env_name ant-dir
          --config_env.visualize_env=False
          --config_rl configs/rl/sac_default.py
          --config_rl.config_actor.hidden_dims="(1024,1024)"
          --config_rl.config_critic.hidden_dims="(1024,1024)"
          --config_seq configs/seq_models/mate_default.py
          --config_seq.seq_model.hidden_size 512
          --config_seq.seq_model.n_layer 2
          --config_seq.embedder.hidden_sizes="(512,)"
          --train_episodes 160000
          --seed 0
          --device 0
          --run_name mate_scale_wider_deeper_s0
          --save_dir ${BASE_DIR}

  # ══════════════════════════════════════════════
  # walker-param — wider (h=512, L=1, actor/critic=1024)
  # ══════════════════════════════════════════════
  - name: walker_param_wider_s0
    sku: 1x40G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - conda run --no-capture-output --name mate
          python main.py
          --config_env configs/envs/mujoco.py
          --config_env.env_name walker-param
          --config_env.visualize_env=False
          --config_rl configs/rl/sac_default.py
          --config_rl.config_actor.hidden_dims="(1024,1024)"
          --config_rl.config_critic.hidden_dims="(1024,1024)"
          --config_seq configs/seq_models/mate_default.py
          --config_seq.seq_model.hidden_size 512
          --train_episodes 160000
          --seed 0
          --device 0
          --run_name mate_scale_wider_s0
          --save_dir ${BASE_DIR}

  # ══════════════════════════════════════════════
  # walker-param — deeper (h=256, L=2, emb_h=(256,))
  # ══════════════════════════════════════════════
  - name: walker_param_deeper_s0
    sku: 1x40G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - conda run --no-capture-output --name mate
          python main.py
          --config_env configs/envs/mujoco.py
          --config_env.env_name walker-param
          --config_env.visualize_env=False
          --config_rl configs/rl/sac_default.py
          --config_seq configs/seq_models/mate_default.py
          --config_seq.seq_model.n_layer 2
          --config_seq.embedder.hidden_sizes="(256,)"
          --train_episodes 160000
          --seed 0
          --device 0
          --run_name mate_scale_deeper_s0
          --save_dir ${BASE_DIR}

  # ══════════════════════════════════════════════
  # walker-param — wider_deeper (h=512, L=2, actor/critic=1024, emb_h=(512,))
  # ══════════════════════════════════════════════
  - name: walker_param_wider_deeper_s0
    sku: 1x80G1-A100
    process_count_per_node: 1
    sla_tier: Premium
