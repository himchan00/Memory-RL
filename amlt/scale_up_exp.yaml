description: >
  Scale-up experiment: disentangle width vs depth effects on MATE performance.
  wider: all networks 2x wider (hidden_size, actor/critic dims).
  deeper: MATE +1 layer, embedders +1 hidden layer.
  wider_deeper: both combined.
  Environments: ant-dir, walker-param, tmaze-active (T=400), seed=0 only.

env_defaults:
  NODES: 1
  GPUS: 1
  BASE_DIR: /mnt/v-hihwang/projects/mate

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchvc

storage:
  my_storage:
    storage_account_name: azsussc
    container_name: v-hihwang
    mount_dir: /mnt/v-hihwang

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main || true
    - conda create -y -n mate python=3.10
    - conda run --name mate conda install -y -c conda-forge mesa libstdcxx-ng
    - conda run --name mate pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cu126
    - conda run --name mate pip install -r requirements.txt

code:
  local_dir: $CONFIG_DIR/..

# ┌──────────────────────────────────────────────────────────────────┐
# │ Scaling summary                                                  │
# │                                                                  │
# │ TMaze baseline:  h=128, L=1, critic=(256,256), emb_h=()          │
# │  wider:         h=256, L=1, critic=(512,512), emb_h=()           │
# │  deeper:        h=128, L=2, critic=(256,256), emb_h=(128,)       │
# │  wider_deeper:  h=256, L=2, critic=(512,512), emb_h=(256,)       │
# │                                                                  │
# │ MuJoCo baseline: h=256, L=1, actor/critic=(512,512), emb_h=()    │
# │  wider:         h=512, L=1, actor/critic=(1024,1024), emb_h=()   │
# │  deeper:        h=256, L=2, actor/critic=(512,512), emb_h=(256,) │
# │  wider_deeper:  h=512, L=2, actor/critic=(1024,1024),emb_h=(512,)│
# └──────────────────────────────────────────────────────────────────┘

jobs:
  # ══════════════════════════════════════════════
  # ant-dir — wider (h=512, L=1, actor/critic=1024)
  # ══════════════════════════════════════════════
  - name: ant_dir_wider_s0
    sku: 1x40G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: &common_env
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        WANDB_API_KEY: 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
        PYTHONUNBUFFERED: "1"
    command:
      - &setup_cmd "export LD_LIBRARY_PATH=/home/aiscuser/.conda/envs/mate/lib:$$LD_LIBRARY_PATH"
      - conda run --no-capture-output --name mate
          python main.py
          --config_env configs/envs/mujoco.py
          --config_env.env_name ant-dir
          --config_env.visualize_env=False
          --config_rl configs/rl/sac_default.py
          --config_rl.config_actor.hidden_dims="(1024,1024)"
          --config_rl.config_critic.hidden_dims="(1024,1024)"
          --config_seq configs/seq_models/mate_default.py
          --config_seq.seq_model.hidden_size 512
          --train_episodes 160000
          --seed 0
          --device 0
          --run_name mate_scale_wider_s0
          --save_dir ${BASE_DIR}

  # ══════════════════════════════════════════════
  # ant-dir — deeper (h=256, L=2, emb_h=(256,))
  # ══════════════════════════════════════════════
  - name: ant_dir_deeper_s0
    sku: 1x40G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - conda run --no-capture-output --name mate
          python main.py
          --config_env configs/envs/mujoco.py
          --config_env.env_name ant-dir
          --config_env.visualize_env=False
          --config_rl configs/rl/sac_default.py
          --config_seq configs/seq_models/mate_default.py
          --config_seq.seq_model.n_layer 2
          --config_seq.embedder.hidden_sizes="(256,)"
          --train_episodes 160000
          --seed 0
          --device 0
          --run_name mate_scale_deeper_s0
          --save_dir ${BASE_DIR}

  # ══════════════════════════════════════════════
  # ant-dir — wider_deeper (h=512, L=2, actor/critic=1024, emb_h=(512,))
  # ══════════════════════════════════════════════
