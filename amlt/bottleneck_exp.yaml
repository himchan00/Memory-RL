description: >
  Bottleneck diagnosis: n_env=64 vs n_env=8 with GPU utilization monitoring.
  If wall-clock shrinks proportionally with n_env -> CPU bottleneck (env stepping).
  If wall-clock barely changes -> GPU bottleneck (model compute).
  Environments: tmaze-active T=400 (DQN), ant-dir (SAC).
  Test budget: train_episodes=8000, WandB disabled.

env_defaults:
  NODES: 1
  GPUS: 1
  BASE_DIR: /mnt/v-hihwang/projects/mate

target:
  service: sing
  workspace_name: wsgcrrbt
  name: msrresrchvc

storage:
  my_storage:
    storage_account_name: azsussc
    container_name: v-hihwang
    mount_dir: /mnt/v-hihwang

environment:
  image: amlt-sing/acpt-torch2.7.1-py3.10-cuda12.6-ubuntu22.04
  setup:
    - conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main || true
    - conda create -y -n mate python=3.10
    - conda run --name mate conda install -y -c conda-forge mesa libstdcxx-ng
    - conda run --name mate pip install torch==2.11.0 --index-url https://download.pytorch.org/whl/cu126
    - conda run --name mate pip install -r requirements.txt

code:
  local_dir: $CONFIG_DIR/..

jobs:
  # ──────────────────────────────────────────────
  # tmaze-active T=400, n_env=64 (default)
  # ──────────────────────────────────────────────
  - name: tmaze_400_nenv64
    sku: 1x80G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: &common_env
        AMLT_DOCKERFILE_TEMPLATE: default
        SHARED_MEMORY_PERCENT: 0.5
        WANDB_API_KEY: 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
        WANDB_MODE: disabled
        PYTHONUNBUFFERED: "1"
    command:
      - &setup_cmd "export LD_LIBRARY_PATH=/home/aiscuser/.conda/envs/mate/lib:$$LD_LIBRARY_PATH"
      - mkdir -p ${BASE_DIR}/bottleneck_logs
      - |
        nvidia-smi dmon -s u -d 5 -o DT > ${BASE_DIR}/bottleneck_logs/tmaze_400_nenv64_gpu.log &
        START_TIME=$$(date +%s)
        conda run --no-capture-output --name mate \
          python -u main.py \
          --config_env configs/envs/tmaze_active.py \
          --config_env.env_name 400 \
          --config_rl configs/rl/dqn_default.py \
          --config_seq configs/seq_models/mate_default.py \
          --config_seq.max_norm 0.03 \
          --config_seq.seq_model.hidden_size 128 \
          --train_episodes 8000 \
          --device 0 \
          --run_name bottleneck_nenv64 \
          --save_dir ${BASE_DIR}
        echo "Wall-clock: $$(( $$(date +%s) - $$START_TIME )) sec" > ${BASE_DIR}/bottleneck_logs/tmaze_400_nenv64_time.log

  # ──────────────────────────────────────────────
  # tmaze-active T=400, n_env=8
  # ──────────────────────────────────────────────
  - name: tmaze_400_nenv8
    sku: 1x80G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - mkdir -p ${BASE_DIR}/bottleneck_logs
      - |
        nvidia-smi dmon -s u -d 5 -o DT > ${BASE_DIR}/bottleneck_logs/tmaze_400_nenv8_gpu.log &
        START_TIME=$$(date +%s)
        conda run --no-capture-output --name mate \
          python -u main.py \
          --config_env configs/envs/tmaze_active.py \
          --config_env.env_name 400 \
          --config_env.n_env 8 \
          --config_rl configs/rl/dqn_default.py \
          --config_seq configs/seq_models/mate_default.py \
          --config_seq.max_norm 0.03 \
          --config_seq.seq_model.hidden_size 128 \
          --train_episodes 8000 \
          --device 0 \
          --run_name bottleneck_nenv8 \
          --save_dir ${BASE_DIR}
        echo "Wall-clock: $$(( $$(date +%s) - $$START_TIME )) sec" > ${BASE_DIR}/bottleneck_logs/tmaze_400_nenv8_time.log

  # ──────────────────────────────────────────────
  # ant-dir, n_env=64 (default)
  # ──────────────────────────────────────────────
  - name: ant_dir_nenv64
    sku: 1x80G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - mkdir -p ${BASE_DIR}/bottleneck_logs
      - |
        nvidia-smi dmon -s u -d 5 -o DT > ${BASE_DIR}/bottleneck_logs/ant_dir_nenv64_gpu.log &
        START_TIME=$$(date +%s)
        conda run --no-capture-output --name mate \
          python -u main.py \
          --config_env configs/envs/mujoco.py \
          --config_env.env_name ant-dir \
          --config_env.visualize_env=False \
          --config_rl configs/rl/sac_default.py \
          --config_seq configs/seq_models/mate_default.py \
          --train_episodes 8000 \
          --device 0 \
          --run_name bottleneck_nenv64 \
          --save_dir ${BASE_DIR}
        echo "Wall-clock: $$(( $$(date +%s) - $$START_TIME )) sec" > ${BASE_DIR}/bottleneck_logs/ant_dir_nenv64_time.log

  # ──────────────────────────────────────────────
  # ant-dir, n_env=8
  # ──────────────────────────────────────────────
  - name: ant_dir_nenv8
    sku: 1x80G1-A100
    process_count_per_node: 1
    sla_tier: Premium
    execution_mode: basic
    submit_args:
      env: *common_env
    command:
      - *setup_cmd
      - mkdir -p ${BASE_DIR}/bottleneck_logs
      - |
        nvidia-smi dmon -s u -d 5 -o DT > ${BASE_DIR}/bottleneck_logs/ant_dir_nenv8_gpu.log &
        START_TIME=$$(date +%s)
        conda run --no-capture-output --name mate \
          python -u main.py \
          --config_env configs/envs/mujoco.py \
          --config_env.env_name ant-dir \
          --config_env.visualize_env=False \
          --config_env.n_env 8 \
          --config_rl configs/rl/sac_default.py \
          --config_seq configs/seq_models/mate_default.py \
          --train_episodes 8000 \
          --device 0 \
          --run_name bottleneck_nenv8 \
          --save_dir ${BASE_DIR}
        echo "Wall-clock: $$(( $$(date +%s) - $$START_TIME )) sec" > ${BASE_DIR}/bottleneck_logs/ant_dir_nenv8_time.log
